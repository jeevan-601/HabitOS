{% extends 'base.html' %}
{% block title %}Create Challenge - Habit Tracker{% endblock %}

{% block content %}
<div class="container-xl">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <a href="{% url 'challenges_list' %}" class="text-muted text-decoration-none small">&larr; Back</a>
            <h1 class="display-font mt-2 mb-4">🎮 Create a Challenge</h1>

            <form method="POST" class="surface p-4">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-bold">Challenge Name</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g., 30-Day Fitness Challenge" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Description</label>
                    <textarea name="description" class="form-control" rows="3" placeholder="What's this challenge about?"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Category</label>
                    <select name="category" class="form-select">
                        {% for value, label in categories %}
                        <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Start Date</label>
                            <input type="date" name="start_date" class="form-control" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label fw-bold">End Date</label>
                            <input type="date" name="end_date" class="form-control" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100">Create Challenge</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
